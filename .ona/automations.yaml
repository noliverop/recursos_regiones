tasks:
  installBackend:
    name: Install backend dependencies
    description: Install Python packages into a venv and apply Django migrations.
    command: |
      cd backend
      python3 -m venv .venv
      .venv/bin/pip install -r requirements.txt
      .venv/bin/python manage.py migrate
    triggeredBy:
      - postDevcontainerStart

  installFrontend:
    name: Install frontend dependencies
    description: Install Node packages for the Vite/React frontend.
    command: |
      cd frontend
      npm install
    triggeredBy:
      - postDevcontainerStart

services:
  django:
    name: Django API
    description: Django REST Framework development server on port 8000.
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: |
        cd backend
        until [ -f .venv/bin/python ]; do
          echo "Waiting for backend venv..."
          sleep 2
        done
        .venv/bin/python manage.py runserver 0.0.0.0:8000
      ready: |
        curl -sf http://localhost:8000/api/auth/csrf/
        API_URL=$(gitpod environment port open 8000 --name django 2>/dev/null)
        echo ""
        echo "=========================================="
        echo "  Django API disponible en:"
        echo "  ${API_URL:-http://localhost:8000}"
        echo "=========================================="

  vite:
    name: Vite Frontend
    description: Vite development server for the React frontend on port 5173.
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: |
        cd frontend
        until [ -d node_modules ]; do
          echo "Waiting for frontend node_modules..."
          sleep 2
        done
        npm run dev -- --host
      ready: |
        curl -sf http://localhost:5173
        FRONTEND_URL=$(gitpod environment port open 5173 --name vite 2>/dev/null)
        echo ""
        echo "=========================================="
        echo "  Frontend disponible en:"
        echo "  ${FRONTEND_URL:-http://localhost:5173}"
        echo "=========================================="
